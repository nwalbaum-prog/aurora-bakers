services:
  evolution-bakers:
    image: atendai/evolution-api:v1.8.7
    container_name: evolution-aurora-bakers
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      # Auth
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: aurora_bakers_evolution_2024
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # Logs (v1 usa lista separada por comas)
      LOG_LEVEL: ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS
      LOG_COLOR: "true"
      LOG_BAILEYS: "error"

      # QR
      QRCODE_LIMIT: 30
      QRCODE_COLOR: "#198754"

      # Webhook global → apunta a Railway
      WEBHOOK_GLOBAL_URL: https://web-production-40d5b.up.railway.app/webhook/evolution
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"

      # Storage (v1 usa filesystem, no requiere postgres)
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"
      CLEAN_STORE_CLEANING_INTERVAL: "7200"
      CLEAN_STORE_MESSAGES: "true"
      CLEAN_STORE_MESSAGE_UP: "true"
      CLEAN_STORE_CONTACTS: "false"
      CLEAN_STORE_CHATS: "false"

      DEL_INSTANCE: "false"

    volumes:
      - evolution_bakers_data:/evolution/instances
      - evolution_bakers_store:/evolution/store

volumes:
  evolution_bakers_data:
  evolution_bakers_store:
